<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Anmeldung | Nilai Yoga</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container" style="padding:60px 0; max-width:700px;">

<h1 style="margin-bottom:10px;">Yoga Anmeldung</h1>
<p style="margin-bottom:30px;">
Bitte füllen Sie das Formular aus. Ich melde mich schnellstmöglich zurück.
</p>

<div class="form-card">

<form id="anmeldung-form" action="https://formspree.io/f/mreaqyqj" method="POST">

<label>
<span>Vorname</span>
<input type="text" name="vorname" required>
</label>

<label>
<span>Nachname</span>
<input type="text" name="nachname" required>
</label>

<label>
<span>Alter</span>
<input type="number" name="alter" min="1" max="120" required>
</label>

<label>
<span>E-Mail</span>
<input type="email" name="email" required>
</label>

<label>
<span>Telefon</span>
<input type="tel" name="telefon">
</label>

<label>
<span>Kursart</span>
<select name="kursart" required>
<option disabled selected>Bitte wählen…</option>
<option>Kinder Yoga</option>
<option>Familien Yoga</option>
<option>Erwachsenen Yoga</option>
<option>Workshop / Kita / Schule</option>
</select>
</label>

<label>
<span>Wunschtermin</span>
<input type="text" name="termin" placeholder="z.B. Montag 16 Uhr">
</label>

<label>
<span>Nachricht</span>
<textarea name="nachricht" rows="5"></textarea>
</label>

<label class="checkbox-label">
  <input type="checkbox" name="datenschutz" required>
  <span>
    Ich habe die <a href="datenschutz.html" target="_blank">Datenschutzerklärung</a> gelesen und stimme der Verarbeitung meiner Angaben zu.
  </span>
</label>

<button class="btn btn--full" type="submit">
  Jetzt anmelden
</button>
<div id="anmeldung-status" class="form-status" aria-live="polite"></div>
</form>

</div>

<p style="margin-top:20px;">
<a href="index.html">← Zurück zur Startseite</a>
</p>

</div>
<script>
(function () {
  const form = document.getElementById('anmeldung-form');
  const statusEl = document.getElementById('anmeldung-status');

  if (!form || !statusEl) return;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    statusEl.className = 'form-status';
    statusEl.textContent = 'Senden…';
    statusEl.style.display = 'block';

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        statusEl.className = 'form-status success';
        statusEl.textContent = 'Vielen Dank! Ihre Anmeldung wurde erfolgreich übermittelt.';
        form.reset();
      } else {
        statusEl.className = 'form-status error';
        statusEl.textContent = 'Fehler – bitte versuchen Sie es später erneut.';
      }
    } catch {
      statusEl.className = 'form-status error';
      statusEl.textContent = 'Verbindungsfehler. Bitte versuchen Sie es später erneut.';
    }
  });
})();
</script>
</body>
</html>
